<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Artistique</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-height-screen flex flex-col">

    <nav class="border-b border-stone-200 bg-white sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#home" class="text-xl font-serif tracking-widest uppercase">Calartiste</a>
            <div class="space-x-6 text-sm uppercase tracking-wider font-medium">
                <a href="#home" class="hover:text-stone-500 transition">Accueil & Galerie</a>
            </div>
        </div>
    </nav>

    <main id="app-content" class="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
        </main>

    <footer class="border-t border-stone-200 bg-stone-100 py-6 text-center text-xs text-stone-500 uppercase tracking-widest">
        &copy; 2026 Tous droits réservés — Œuvres originales
    </footer>

    <script>
        // Ton URL Google Sheet validée
        const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQk9Dml6V_k88-UPF6iGnabqOLxgChxRG4Q0_cIQVF4YcAE3bS0qNaXy1h4URmgaLIx-HOCn7TyDd_m/pub?output=csv";

        let catalogueOeuvres = [];

        // 1. Chargement des données
        async function initialiserSite() {
            try {
                const response = await fetch(URL_CSV);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        catalogueOeuvres = results.data;
                        // Écoute les changements pour ouvrir le détail d'un tableau
                        window.addEventListener('hashchange', router);
                        router();
                    }
                });
            } catch (error) {
                document.getElementById('app-content').innerHTML = `<p class="text-center text-red-500 py-12">Erreur lors du chargement des œuvres. Vérifie le lien CSV.</p>`;
            }
        }

        // 2. Le Routeur (Gère l'affichage Accueil vs Page Détail)
        function router() {
            const hash = window.location.hash || '#home';
            const conteneur = document.getElementById('app-content');
            
            if (hash === '#home') {
                afficherPagePrincipale(conteneur);
            } else if (hash.startsWith('#oeuvre/')) {
                const idOeuvre = hash.split('/')[1];
                afficherPDP(conteneur, idOeuvre);
            } else {
                conteneur.innerHTML = `<h2 class="text-center py-12">Page introuvable</h2>`;
            }
            window.scrollTo(0, 0);
        }

        // 3. PAGE PRINCIPALE (Présentation + Galerie Excel combinées)
        function afficherPagePrincipale(cible) {
            // Bloc Présentation du haut
            let htmlPresentation = `
                <div class="grid md:grid-cols-2 gap-12 items-center py-12 border-b border-stone-200 mb-12">
                    <div class="space-y-6">
                        <h1 class="text-4xl md:text-5xl font-serif text-stone-900 leading-tight">Explorer l'invisible à travers la couleur.</h1>
                        <p class="text-stone-600 leading-relaxed text-lg">
                            Bienvenue dans l'univers de l'artiste. À travers ses toiles, elle capture les émotions éphémères et les paysages abstraits. Chaque coup de pinceau est une histoire, chaque texture une invitation au voyage.
                        </p>
                    </div>
                    <div class="aspect-[4/5] bg-stone-200 overflow-hidden shadow-sm">
                        <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=800" alt="Atelier d'artiste" class="w-full h-full object-cover">
                    </div>
                </div>
            `;

            // Bloc Galerie du bas (généré à partir de l'Excel)
            let htmlGalerie = "";
            
            if (catalogueOeuvres.length === 0) {
                htmlGalerie = `<p class="text-center py-12 text-stone-500">Aucune œuvre trouvée dans le fichier Excel. Vérifie tes lignes.</p>`;
            } else {
                let htmlGrille = catalogueOeuvres.map(oeuvre => `
                    <a href="#oeuvre/${oeuvre.id}" class="group block space-y-3">
                        <div class="aspect-square bg-stone-100 overflow-hidden shadow-sm">
                            <img src="${oeuvre.image_url}" alt="${oeuvre.titre}" class="w-full h-full object-cover group-hover:scale-102 transition duration-300">
                        </div>
                        <div class="flex justify-between items-baseline pt-1">
                            <h3 class="font-serif text-lg text-stone-900 group-hover:underline">${oeuvre.titre}</h3>
                            <span class="text-xs text-stone-400 font-medium uppercase">${oeuvre.technique}</span>
                        </div>
                    </a>
                `).join('');

                htmlGalerie = `
                    <div class="py-6 space-y-8">
                        <div class="text-center space-y-2">
                            <h2 class="text-3xl font-serif tracking-wide text-stone-900">La Collection</h2>
                            <p class="text-stone-500 text-sm uppercase tracking-widest">Mise à jour en direct depuis Google Sheets</p>
                        </div>
                        <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-8">
                            ${htmlGrille}
                        </div>
                    </div>
                `;
            }

            // On injecte les deux blocs l'un après l'autre
            cible.innerHTML = htmlPresentation + htmlGalerie;
        }

        // 4. PAGE DÉTAIL (Quand on clique sur un tableau)
        function afficherPDP(cible, id) {
            const oeuvre = catalogueOeuvres.find(o => o.id === id);

            if (!oeuvre) {
                cible.innerHTML = `<div class="text-center py-12"><p class="mb-4">Œuvre introuvable.</p><a href="#home" class="underline text-stone-600">Retour à l'accueil</a></div>`;
                return;
            }

            cible.innerHTML = `
                <div class="py-6">
                    <a href="#home" class="text-xs uppercase tracking-widest text-stone-500 hover:text-stone-900 transition flex items-center gap-2 mb-8">
                        ← Retour à la galerie
                    </a>
                    <div class="grid md:grid-cols-12 gap-12 items-start">
                        <div class="md:col-span-7 bg-stone-100 shadow-md">
                            <img src="${oeuvre.image_url}" alt="${oeuvre.titre}" class="w-full h-auto max-h-[80vh] object-contain mx-auto">
                        </div>
                        <div class="md:col-span-5 space-y-6 sticky top-24">
                            <div class="border-b border-stone-200 pb-4 space-y-2">
                                <h1 class="text-3xl md:text-4xl font-serif text-stone-900">${oeuvre.titre}</h1>
                                <p class="text-stone-500 italic text-sm">${oeuvre.technique} — ${oeuvre.dimensions}</p>
                            </div>
                            <div class="space-y-4">
                                <h4 class="text-xs uppercase tracking-widest font-semibold text-stone-400">À propos de l'œuvre</h4>
                                <p class="text-stone-600 leading-relaxed whitespace-pre-line">${oeuvre.description}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Lancement du site
        initialiserSite();
    </script>
</body>
</html>
