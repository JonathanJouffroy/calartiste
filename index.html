<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calar.artiste | Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --font-serif: "Playfair Display", serif;
        }
        
        .font-serif {
            font-family: var(--font-serif);
        }
        
        .group-hover\:scale-105 {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-height-screen flex flex-col">

    <nav class="border-b border-stone-200 bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="#home" class="text-2xl font-serif tracking-widest uppercase font-bold text-stone-900">Calar.artiste</a>
            <div class="space-x-8 text-xs uppercase tracking-[0.2em] font-medium">
                <a href="#home" class="hover:text-stone-500 transition">Portfolio</a>
            </div>
        </div>
    </nav>

    <main id="app-content" class="flex-grow max-w-6xl w-full mx-auto px-6 py-12">
        <div class="flex justify-center items-center h-64">
            <p class="text-stone-400 font-serif italic animate-pulse">L'univers de Calar.artiste take vie...</p>
        </div>
    </main>

    <footer class="border-t border-stone-100 bg-stone-50 py-16">
        <div class="max-w-6xl mx-auto px-6 flex flex-col items-center space-y-8">
            <a href="https://www.instagram.com/calar.artiste" target="_blank" 
               class="text-4xl text-stone-300 hover:text-stone-900 transition-all duration-500 transform hover:rotate-12 hover:scale-110">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <div class="text-center space-y-3">
                <p class="text-[10px] font-serif italic text-stone-400 tracking-widest uppercase">Calar.artiste</p>
                <div class="h-px w-8 bg-stone-200 mx-auto"></div>
                <p class="text-[9px] text-stone-400 uppercase tracking-[0.3em]">&copy; 2026 — Archive d'Atelier</p>
            </div>
        </div>
    </footer>

    <script>
        const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQk9Dml6V_k88-UPF6iGnabqOLxgChxRG4Q0_cIQVF4YcAE3bS0qNaXy1h4URmgaLIx-HOCn7TyDd_m/pub?output=csv"; 

        let catalogueOeuvres = [];

        async function initialiserSite() {
            try {
                const response = await fetch(URL_CSV);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        catalogueOeuvres = results.data.map(rangee => {
                            const normalise = {};
                            for (let cle in rangee) {
                                normalise[cle.toLowerCase().trim().replace(/_/g, '')] = rangee[cle];
                            }

                            // GESTION MULTI-IMAGES : On découpe le texte par les virgules
                            const champImage Complet = normalise.imageurl || normalise.image || "";
                            const listeImages = champImageComplet.split(',')
                                .map(url => url.trim())
                                .filter(url => url.length > 0);

                            return {
                                id: normalise.id || normalise.num || "",
                                titre: normalise.titre || "Sans titre",
                                description: normalise.description || "",
                                dimensions: normalise.dimensions || "",
                                technique: normalise.technique || "",
                                images: listeImages // Stocke le tableau de toutes les images
                            };
                        });
                        window.addEventListener('hashchange', router);
                        router();
                    }
                });
            } catch (error) {
                document.getElementById('app-content').innerHTML = `<p class="text-center text-red-500 py-12">Connexion interrompue.</p>`;
            }
        }

        function router() {
            const hash = window.location.hash || '#home';
            const conteneur = document.getElementById('app-content');
            
            if (hash === '#home' || hash === '') {
                afficherPagePrincipale(conteneur);
            } else if (hash.startsWith('#oeuvre/')) {
                const idOeuvre = hash.split('/')[1];
                afficherPDP(conteneur, idOeuvre);
            } else {
                window.location.hash = '#home';
            }
            window.scrollTo(0, 0);
        }

        function afficherPagePrincipale(cible) {
            let htmlPresentation = `
                <div class="grid md:grid-cols-2 gap-16 items-center pb-20 border-b border-stone-100 mb-20">
                    <div class="space-y-8">
                        <h1 class="text-5xl md:text-6xl font-serif text-stone-900 leading-[1.1]">Explorer l'invisible.</h1>
                        <p class="text-stone-500 leading-relaxed text-lg font-light">
                            Bienvenue dans l'univers de <span class="font-serif italic">Calar.artiste</span>. À travers ses toiles, elle capture les émotions éphémères et les paysages abstraits. Chaque coup de pinceau est une invitation.
                        </p>
                    </div>
                    <div class="aspect-[4/5] bg-stone-200 overflow-hidden shadow-2xl relative">
                        <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=800" alt="Atelier" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700">
                    </div>
                </div>
            `;

            const oeuvresValides = catalogueOeuvres.filter(o => o.id !== "");
            let htmlGrille = oeuvresValides.map(oeuvre => {
                // On prend la première image de la liste, ou une image vide par défaut
                const imageAffichee = oeuvre.images.length > 0 ? oeuvre.images[0] : "";
                
                return `
                    <a href="#oeuvre/${oeuvre.id}" class="group block space-y-4">
                        <div class="aspect-square bg-stone-100 overflow-hidden shadow-sm border border-stone-100">
                            <img src="${imageAffichee}" alt="${oeuvre.titre}" class="w-full h-full object-cover group-hover:scale-105 transition">
                        </div>
                        <div class="flex justify-between items-baseline px-1">
                            <h3 class="font-serif text-xl text-stone-900 group-hover:italic transition-all">${oeuvre.titre}</h3>
                            <span class="text-[9px] text-stone-400 font-bold uppercase tracking-[0.2em]">${oeuvre.technique}</span>
                        </div>
                    </a>
                `;
            }).join('');

            cible.innerHTML = htmlPresentation + `
                <div class="py-10 space-y-16">
                    <div class="text-center">
                        <h2 class="text-4xl font-serif text-stone-900">Œuvres Récentes</h2>
                        <div class="h-px w-16 bg-stone-900 mx-auto mt-6"></div>
                    </div>
                    <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-12">
                        ${htmlGrille}
                    </div>
                </div>
            `;
        }

        function afficherPDP(cible, id) {
            const oeuvre = catalogueOeuvres.find(o => o.id === id);
            if (!oeuvre) { window.location.hash = '#home'; return; }

            const imagePrincipale = oeuvre.images.length > 0 ? oeuvre.images[0] : "";

            // Génération des vignettes seulement s'il y a plusieurs images
            let htmlVignettes = "";
            if (oeuvre.images.length > 1) {
                htmlVignettes = `
                    <div class="flex flex-wrap gap-2 mt-4">
                        ${oeuvre.images.map((img, index) => `
                            <button onclick="document.getElementById('pdp-main-image').src='${img}'" 
                                    class="w-16 h-16 bg-stone-100 border border-stone-200 overflow-hidden hover:border-stone-900 focus:border-stone-900 transition p-0.5 cursor-pointer">
                                <img src="${img}" class="w-full h-full object-cover">
                            </button>
                        `).join('')}
                    </div>
                `;
            }

            cible.innerHTML = `
                <div class="animate-in fade-in duration-700">
                    <a href="#home" class="text-[10px] uppercase tracking-[0.3em] text-stone-400 hover:text-stone-900 flex items-center gap-3 mb-16 transition">
                        ← Retour à l'archive
                    </a>
                    <div class="grid md:grid-cols-12 gap-20 items-start">
                        <div class="md:col-span-8">
                            <div class="bg-white shadow-2xl p-4 border border-stone-100 flex items-center justify-center">
                                <img id="pdp-main-image" src="${imagePrincipale}" alt="${oeuvre.titre}" class="w-full h-auto max-h-[75vh] object-contain">
                            </div>
                            ${htmlVignettes}
                        </div>
                        
                        <div class="md:col-span-4 space-y-12 pt-4">
                            <div class="space-y-4 border-b border-stone-100 pb-10">
                                <h1 class="text-4xl font-serif text-stone-900 leading-tight">${oeuvre.titre}</h1>
                                <p class="text-stone-400 font-serif italic text-base">${oeuvre.technique} — ${oeuvre.dimensions}</p>
                            </div>
                            <div class="space-y-6">
                                <h4 class="text-[10px] uppercase tracking-[0.2em] font-bold text-stone-300">À propos de l'œuvre</h4>
                                <p class="text-stone-600 leading-relaxed text-lg font-light whitespace-pre-line">${oeuvre.description}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        initialiserSite();
    </script>
</body>
</html>
